<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>다운로드</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto; padding: 24px; }
    a { text-decoration: none; }
    li { margin: 10px 0; }
    .muted { color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <h2>📦 다운로드</h2>
  <div id="status" class="muted">불러오는 중...</div>
  <ul id="list"></ul>
  <div>
    <h1>app link & deep link</h1>
    <ul>
      <li><a href="kbchachacha://post_kbcha?url=%2Fsecured%2Fapp%2Fmydealer%2Fcar%2Fplay%2Fad%2Finfo.kbc&abx_tid=1770709713013%3A0bee02c7-b523-4910-b283-3a712a7d9fe0">테마픽</a></li>
      <li><a href="https://fsdsgsz3aecoi4m29zwucg.adtouch.adbrix.io/api/v1/click/0G4c3G5CS0SniQmCLlpMBA?deeplink_custom_path=%7Bdeeplink_custom_path%7D">다이나믹</a></li>
      <li><a href="https://kbchachacha.ap2.dfn.link/api/v1/click/QC6UIzos7Ui1Hi1ZFkLlBA?abx_tracker_id=QC6UIzos7Ui1Hi1ZFkLlBA">다이나믹2</a></li>
    </ul>
  </div>
<script>
  const owner = "chekyu";
  const repo  = "down";
  const branch = "main";
  const folderPath = "downloads"; // 레포 내 폴더

  const api = `https://api.github.com/repos/${owner}/${repo}/contents/${folderPath}?ref=${branch}`;

  function bytesToSize(bytes) {
    if (bytes === 0) return "0 B";
    const k = 1024, sizes = ["B","KB","MB","GB"];
    const i = Math.floor(Math.log(bytes)/Math.log(k));
    return (bytes/Math.pow(k,i)).toFixed(i===0?0:1) + " " + sizes[i];
  }

  fetch(api)
    .then(r => {
      if (!r.ok) throw new Error(`GitHub API 오류: ${r.status}`);
      return r.json();
    })
    .then(items => {
      const list = document.getElementById("list");
      const status = document.getElementById("status");

      // 파일만 필터링
      const files = items.filter(x => x.type === "file");

      if (files.length === 0) {
        status.textContent = "다운로드할 파일이 없습니다.";
        return;
      }

      status.textContent = `파일 ${files.length}개`;

      files.forEach(f => {
        const li = document.createElement("li");

        // ✅ download_url은 raw 파일 링크(바로 다운로드/열림)
        const a = document.createElement("a");
        a.href = f.download_url;
        a.textContent = f.name;

        const meta = document.createElement("div");
        meta.className = "muted";
        meta.textContent = `크기: ${bytesToSize(f.size)}`;

        li.appendChild(a);
        li.appendChild(meta);
        list.appendChild(li);
      });
    })
    .catch(err => {
      document.getElementById("status").textContent = err.message;
    });
</script>
</body>
</html>
